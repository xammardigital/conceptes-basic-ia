<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enginyeria de Prompts - Guia Pràctica | Xammar Digital</title>
    
    <!-- Google Fonts: Funnel Display & Funnel Sans for Xammar Digital -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@400;600;700&family=Funnel+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Branding Xammar Digital */
            --primary-orange: #FF6B00;
            --hover-orange: #FF8A33;
            --heading-blue: #1A365D;
            --text-dark: #2D3748;
            --bg-special: #EDF2F7;
            --bg-main: #FFFFFF;
            --border-light: #CBD5E0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Funnel Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-family: 'Funnel Display', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--heading-blue);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-dark);
            font-size: 1.25rem;
            opacity: 0.8;
        }

        .slide-container {
            border-radius: 1rem;
            padding: 3rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 10px 30px -5px rgba(26, 54, 93, 0.1);
            transition: all 0.4s ease;
            border: 1px solid var(--border-light);
        }

        .level-badge {
            display: inline-block;
            font-family: 'Funnel Display', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            background-color: var(--heading-blue);
            color: var(--bg-main);
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            margin-bottom: 1.5rem;
            align-self: flex-start;
        }

        .slide-title {
            font-family: 'Funnel Display', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--heading-blue);
            margin-bottom: 1rem;
        }

        .slide-description {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            color: var(--text-dark);
            opacity: 0.9;
            white-space: pre-line;
            line-height: 1.6;
        }

        .prompt-section {
            margin-bottom: 1.5rem;
        }

        .prompt-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--heading-blue);
            font-family: 'Funnel Display', sans-serif;
            font-size: 1.1rem;
        }

        .prompt-label span:first-child {
            font-size: 1.5rem;
        }

        .prompt-box {
            background-color: var(--bg-main);
            border: 1px solid var(--border-light);
            border-left: 4px solid var(--primary-orange);
            border-radius: 0.5rem;
            padding: 1.25rem;
            position: relative;
            padding-right: 4rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .prompt-section-bad .prompt-box {
            border-left: 4px solid #E53E3E;
            background-color: #FFF5F5;
        }

        .prompt-box code {
            font-size: 0.95rem;
            white-space: pre-wrap;
            display: block;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
            color: var(--text-dark);
        }

        .copy-button {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background-color: var(--bg-special);
            border: 1px solid var(--border-light);
            color: var(--heading-blue);
            padding: 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-button:hover {
            background-color: var(--heading-blue);
            color: var(--bg-main);
            border-color: var(--heading-blue);
        }

        .copy-button svg {
            width: 1.25rem;
            height: 1.25rem;
        }

        .navigation {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 2rem;
            padding: 1rem 0;
        }

        .nav-button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--primary-orange);
            border: none;
            padding: 0.85rem 1.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            color: white;
            font-family: 'Funnel Sans', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background-color 0.2s, transform 0.1s;
        }

        .nav-button:hover:not(:disabled) {
            background-color: var(--hover-orange);
            transform: translateY(-2px);
        }

        .nav-button:disabled {
            background-color: var(--border-light);
            color: #A0AEC0;
            cursor: not-allowed;
            transform: none;
        }

        .nav-button svg {
            width: 1.25rem;
            height: 1.25rem;
        }

        .progress {
            text-align: center;
        }

        .progress-text {
            font-size: 1rem;
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 0.75rem;
            font-family: 'Funnel Display', sans-serif;
        }

        .progress-dots {
            display: flex;
            gap: 0.35rem;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 300px;
        }

        .progress-dot {
            height: 0.5rem;
            width: 0.5rem;
            border-radius: 9999px;
            background-color: var(--border-light);
            transition: all 0.3s;
        }

        .progress-dot.active {
            background-color: var(--primary-orange);
            width: 1.5rem;
        }

        /* Colores de fondo por nivel ajustados a la marca */
        .bg-intro { background: linear-gradient(135deg, var(--bg-main), var(--bg-special)); }
        .bg-level1 { background: linear-gradient(135deg, #F0FFF4, #C6F6D5); }
        .bg-level2 { background: linear-gradient(135deg, #FFFBEB, #FEEBC8); }
        .bg-level3 { background: linear-gradient(135deg, #EBF8FF, #BEE3F8); }
        .bg-level4 { background: linear-gradient(135deg, #FAF5FF, #E9D5FF); }
        .bg-final { background: linear-gradient(135deg, var(--bg-main), var(--bg-special)); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Enginyeria de Prompts</h1>
            <p>Guia pràctica de Xammar Digital (Nivell 1 al 4)</p>
        </div>

        <div id="slideContainer" class="slide-container"></div>

        <div class="navigation">
            <button id="prevBtn" class="nav-button" onclick="prevSlide()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Anterior
            </button>

            <div class="progress">
                <div class="progress-text" id="progressText">1 / 18</div>
                <div class="progress-dots" id="progressDots"></div>
            </div>

            <button id="nextBtn" class="nav-button" onclick="nextSlide()">
                Següent
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const slides = [
            {
                level: "Introducció",
                title: "Què és un prompt?",
                description: "Un prompt és la instrucció que dones a una IA perquè faci una tasca. Com més clar siguis, millor t'entendrà.",
                colorClass: "bg-intro"
            },
            {
                level: "🟢 Nivell 1",
                title: "Sigues clar i específic",
                bad: "Planifica un cap de setmana a Girona.",
                good: "Planifica un itinerari de cap de setmana (dissabte i diumenge) a Girona per a una parella. Ens agrada passejar pel casc antic, la gastronomia i la fotografia. El pressupost és mitjà.",
                colorClass: "bg-level1"
            },
            {
                level: "🟢 Nivell 1",
                title: "Usa llenguatge natural",
                description: "Escriu com si parlessis amb una persona real. En lloc de paraules clau com en un cercador, construeix frases completes.",
                colorClass: "bg-level1"
            },
            {
                level: "🟢 Nivell 1",
                title: "Indica el to o format",
                bad: "Felicita l'aniversari al meu amic Pau.",
                good: "Escriu un missatge de felicitació d'aniversari per al meu amic Pau per enviar per WhatsApp. Fes servir un to divertit i proper, i acaba amb un emoji de festa.",
                colorClass: "bg-level1"
            },
            {
                level: "🟢 Nivell 1",
                title: "Demana passos si és complex",
                bad: "Com puc començar a meditar?",
                good: "Vull començar a meditar per reduir l'estrès. Explica'm com fer-ho pas a pas per a un principiant total. Començant per només 5 minuts al dia.",
                colorClass: "bg-level1"
            },
            {
                level: "🟢 Nivell 1",
                title: "Estructura bàsica",
                description: "Rol → Objectiu → To → Format",
                good: "Ets un nutricionista expert en menjar saludable i ràpid.\nDona'm 3 idees d'esmorzars rics en proteïnes.\nEl to ha de ser motivador i fàcil d'entendre.\nPresenta les idees en una llista numerada.",
                colorClass: "bg-level1"
            },
            {
                level: "🟡 Nivell 2",
                title: "Assignar rols (Role Prompting)",
                description: "Donar un rol a la IA millora dràsticament la qualitat de la resposta.",
                bad: "Dona'm idees per a un viatge a Tòquio.",
                good: "Ets un guia turístic expert en Tòquio, especialitzat en viatges de baix pressupost. Suggereix un itinerari de 5 dies que combini llocs famosos amb experiències locals autèntiques.",
                colorClass: "bg-level2"
            },
            {
                level: "🟡 Nivell 2",
                title: "Donar context addicional",
                description: "El context ajuda la IA a entendre per a qui o per a què és la resposta.",
                bad: "Explica'm què és un forat negre.",
                good: "Vull explicar-li al meu fill de 8 anys què és un forat negre. Explica-ho amb una analogia senzilla que pugui entendre, com si fos un conte.",
                colorClass: "bg-level2"
            },
            {
                level: "🟡 Nivell 2",
                title: "Control del format de sortida",
                description: "Sigues explícit sobre com vols que es presenti la informació.",
                bad: "Compara Netflix i HBO Max.",
                good: "Fes una taula comparativa entre Netflix i HBO Max. Inclou aquestes columnes: Preu, Millors sèries originals, Ideal per a...",
                colorClass: "bg-level2"
            },
            {
                level: "🟡 Nivell 2",
                title: "Exemples (Few-shot learning)",
                description: "Mostrar exemples és la manera més ràpida perquè la IA entengui el format exacte.",
                good: "Converteix les següents afirmacions en preguntes, seguint l'estil dels exemples:\n\nExemple 1:\nAfirmació: \"La pel·lícula va ser interessant.\"\nPregunta: \"Què et va semblar la pel·lícula?\"\n\nExemple 2:\nAfirmació: \"Demà aniré a comprar.\"\nPregunta: \"Què necessites comprar demà?\"\n\nAra, converteix aquesta: 'El concert va estar genial'.",
                colorClass: "bg-level2"
            },
            {
                level: "🟡 Nivell 2",
                title: "Enllaçar passos",
                description: "Guia la IA a través d'un procés lògic per obtenir respostes més completes.",
                bad: "Recomana'm un llibre.",
                good: "Primer, fes-me 3 preguntes per entendre els meus gustos literaris. Després, basant-te en les meves respostes, recomana'm 2 llibres i explica per què creus que m'agradaran.",
                colorClass: "bg-level2"
            },
            {
                level: "🔵 Nivell 3",
                title: "Ús d'XML per estructurar",
                description: "Les etiquetes XML organitzen la informació complexa, evitant confusions.",
                good: "<peticio>\n  <rol>Ets un planificador de viatges personalitzat.</rol>\n  <objectiu>Crea un pla per a una tarda a París.</objectiu>\n  <context>\n    <viatgers>Una parella jove</viatgers>\n    <interessos>Art, cafès amb encant, fotografia</interessos>\n    <restriccions>Tenim un pressupost baix i no volem fer cues llargues.</restriccions>\n  </context>\n  <format>Una llista d'activitats en ordre cronològic, de 16:00h a 21:00h.</format>\n</peticio>",
                colorClass: "bg-level3"
            },
            {
                level: "🔵 Nivell 3",
                title: "Cadena de pensament (Chain of Thought)",
                description: "Força la IA a raonar abans de respondre. Ideal per a problemes lògics.",
                bad: "És millor anar de vacances a la platja o a la muntanya a l'agost?",
                good: "Vull decidir les meves vacances d'agost. Raona pas a pas els pros i contres de la platja i la muntanya, considerant factors com la calor, la quantitat de gent i el tipus d'activitats. Després del teu anàlisi, fes una recomanació.",
                colorClass: "bg-level3"
            },
            {
                level: "🔵 Nivell 3",
                title: "Prompts llargs amb context",
                description: "Per analitzar textos llargs, posa sempre el text al principi i la pregunta al final.",
                good: "<document>\n  <font>ressenyes_restaurant_el_bon_gust.txt</font>\n  <contingut>\n    [Aquí anirien 50 ressenyes llargues de clients]\n  </contingut>\n</document>\n\n**Instrucció (al final):**\nAnalitza totes les ressenyes i resumeix en una llista els 3 plats més elogiats i les 2 queixes més repetides sobre el servei.",
                colorClass: "bg-level3"
            },
            {
                level: "🟣 Nivell 4",
                title: "Raonament Profund",
                description: "En 2026, els models no només responen, sinó que \"pensen\" abans de parlar. Aquí el secret no és demanar el resultat, sinó guiar el procés de pensament.",
                bad: "Fes-me un resum d'aquest pla de negoci i digues si funcionarà.",
                good: "<rol>Ets un analista d'inversions expert en risc tecnològic.</rol>\n<context>T'adjunto el PDF del pla de negoci de la meva nova startup.</context>\n<instruccions>\n1. Activa el teu mode de raonament profund (Chain of Thought).\n2. Analitza les 3 hipòtesis principals del document.\n3. Troba possibles contradiccions o punts febles que jo hagi passat per alt.\n4. No em donis només el resum; explica'm el teu procés lògic per arribar a la conclusió.\n</instruccions>",
                colorClass: "bg-level4"
            },
            {
                level: "🟣 Nivell 4",
                title: "Multimodalitat Activa",
                description: "Ja no cal descriure-ho tot amb text. La IA té ulls. Aprèn a utilitzar imatges i vídeos com a part del teu prompt.",
                bad: "Tinc un error en una línia de codi que surt de color vermell i diu 'syntax error'...",
                good: "<context>\n[Imatge adjunta de la captura de pantalla de l'error i el codi adjacent]\n</context>\n<instruccions>\nMira la captura de pantalla que t'he passat. \n1. Identifica exactament en quina línia del meu editor hi ha l'error.\n2. Compara el meu codi amb la documentació oficial actualitzada a 2026.\n3. Proposa la correcció directa i explica per què ha fallat.\n</instruccions>",
                colorClass: "bg-level4"
            },
            {
                level: "🟣 Nivell 4",
                title: "Gestió d'Agents i Eines",
                description: "El prompt modern ja no demana un text, demana una execució. Ensenyem a la IA a fer servir les seves eines (navegador, codi, calendaris).",
                bad: "Busca a Google quines són les tendències de disseny d'avui.",
                good: "<rol>Ets el meu Agent de Recerca de Mercat.</rol>\n<instruccions>\n1. Utilitza l'eina de **Cerca Web** per trobar els 5 articles més llegits avui sobre UI/UX.\n2. Fes servir l'eina d'**Anàlisi de Dades** per crear una taula comparativa de les tendències esmentades.\n3. Genera un fitxer .csv amb aquesta taula i envia'm el resum final per llegir-lo ara.\n</instruccions>",
                colorClass: "bg-level4"
            },
            {
                level: "🧠 Consells Finals",
                title: "Claus per a l'èxit",
                description: "• Com millor formulis el prompt, menys temps perdràs corregint\n• Desa els teus prompts efectius com a plantilles\n• Fes que la IA t'avaluï: \"Quina part d'aquest prompt podria millorar-se?\"",
                colorClass: "bg-final"
            }
        ];

        let currentSlide = 0;

        function renderSlide() {
            const slide = slides[currentSlide];
            const container = document.getElementById('slideContainer');
            
            container.className = 'slide-container ' + slide.colorClass;
            
            let html = `
                <div class="level-badge">${slide.level}</div>
                <h2 class="slide-title">${slide.title}</h2>
            `;

            if (slide.description) {
                html += `<p class="slide-description">${slide.description}</p>`;
            }

            if (slide.bad) {
                html += `
                    <div class="prompt-section prompt-section-bad">
                        <div class="prompt-label">
                            <span>❌</span>
                            <span>Així no:</span>
                        </div>
                        <div class="prompt-box">
                            <code>${escapeHtml(slide.bad)}</code>
                            <button class="copy-button" onclick="copyToClipboard(${currentSlide}, 'bad')" title="Copiar prompt">
                                <svg id="icon-bad-${currentSlide}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }

            if (slide.good) {
                html += `
                    <div class="prompt-section">
                        <div class="prompt-label">
                            <span>✅</span>
                            <span>Així sí:</span>
                        </div>
                        <div class="prompt-box">
                            <code>${escapeHtml(slide.good)}</code>
                            <button class="copy-button" onclick="copyToClipboard(${currentSlide}, 'good')" title="Copiar prompt">
                                <svg id="icon-good-${currentSlide}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;

            // Update progress
            document.getElementById('progressText').textContent = `${currentSlide + 1} / ${slides.length}`;
            
            // Update progress dots
            const dotsContainer = document.getElementById('progressDots');
            dotsContainer.innerHTML = '';
            slides.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = 'progress-dot' + (index === currentSlide ? ' active' : '');
                // Click en los puntos para navegar rápidademente
                dot.style.cursor = 'pointer';
                dot.onclick = () => {
                    currentSlide = index;
                    renderSlide();
                };
                dotsContainer.appendChild(dot);
            });

            // Update buttons
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyToClipboard(slideIndex, type) {
            const slide = slides[slideIndex];
            const text = type === 'bad' ? slide.bad : slide.good;
            
            navigator.clipboard.writeText(text).then(() => {
                const icon = document.getElementById(`icon-${type}-${slideIndex}`);
                const originalContent = icon.innerHTML;
                
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>';
                
                setTimeout(() => {
                    icon.innerHTML = originalContent;
                }, 2000);
            }).catch(err => {
                console.error('Error copiant el text:', err);
                alert('No s\'ha pogut copiar el text');
            });
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        }

        // Initialize
        renderSlide();
    </script>
</body>
</html>
