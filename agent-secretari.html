<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercici: Agent de Secretaria amb Mistral | Xammar Digital</title>
    
    <!-- Google Fonts: Funnel Display & Funnel Sans for Xammar Digital -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@400;600;700&family=Funnel+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Branding Xammar Digital */
            --primary-orange: #FF6B00;
            --hover-orange: #FF8A33;
            --heading-blue: #1A365D;
            --text-dark: #2D3748;
            --bg-special: #EDF2F7;
            --bg-main: #FFFFFF;
            --border-light: #CBD5E0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Funnel Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            /* Scroll fix para contenidos más largos */
            overflow-y: auto;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-family: 'Funnel Display', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--heading-blue);
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-dark);
            font-size: 1.25rem;
            opacity: 0.8;
        }

        .slide-container {
            border-radius: 1rem;
            padding: 3rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 10px 30px -5px rgba(26, 54, 93, 0.1);
            transition: all 0.4s ease;
            border: 1px solid var(--border-light);
            /* Ajuste para que se expanda si el contenido es largo */
            min-height: 60vh;
        }

        .level-badge {
            display: inline-block;
            font-family: 'Funnel Display', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            background-color: var(--heading-blue);
            color: var(--bg-main);
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            margin-bottom: 1.5rem;
            align-self: flex-start;
        }

        .slide-title {
            font-family: 'Funnel Display', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--heading-blue);
            margin-bottom: 1rem;
        }

        .slide-description {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
            opacity: 0.9;
            white-space: pre-line;
            line-height: 1.6;
        }

        .slide-description code {
            background-color: var(--bg-special);
            color: var(--primary-orange);
            padding: 0.2rem 0.5rem;
            border-radius: 0.3rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
        }

        .slide-description strong {
            font-family: 'Funnel Sans', sans-serif;
            font-weight: 600;
            color: var(--primary-orange);
        }

        .prompt-section {
            margin-bottom: 1rem;
        }

        .prompt-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--heading-blue);
            font-family: 'Funnel Display', sans-serif;
            font-size: 1.1rem;
        }

        .prompt-label span:first-child {
            font-size: 1.5rem;
        }

        .prompt-box {
            background-color: var(--bg-main);
            border: 1px solid var(--border-light);
            border-left: 4px solid var(--primary-orange);
            border-radius: 0.5rem;
            padding: 1.25rem;
            position: relative;
            padding-right: 4rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-bottom: 1rem;
        }

        .prompt-section-bad .prompt-box {
            border-left: 4px solid #E53E3E;
            background-color: #FFF5F5;
        }

        /* Variante gris para Inputs en ejemplos */
        .prompt-box-gray {
            border-left: 4px solid #A0AEC0;
            background-color: #F7FAFC;
        }

        .prompt-box code {
            font-size: 0.95rem;
            white-space: pre-wrap;
            display: block;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
            color: var(--text-dark);
        }

        .copy-button {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background-color: var(--bg-special);
            border: 1px solid var(--border-light);
            color: var(--heading-blue);
            padding: 0.6rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-button:hover {
            background-color: var(--heading-blue);
            color: var(--bg-main);
            border-color: var(--heading-blue);
        }

        .copy-button svg {
            width: 1.25rem;
            height: 1.25rem;
        }

        .comparison-reason {
            font-size: 1.1rem;
            margin-top: 0.5rem;
            margin-bottom: 2.5rem;
            padding: 1rem;
            background-color: var(--bg-special);
            border-radius: 0.5rem;
            color: var(--text-dark);
            border-left: 3px solid var(--heading-blue);
        }

        .closing-text {
            font-size: 1.35rem;
            margin-top: 2rem;
            color: var(--text-dark);
            background: #F0FFF4;
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid #C6F6D5;
            line-height: 1.6;
        }

        .closing-text strong {
            color: #2F855A;
        }

        .navigation {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 2rem;
            padding: 1rem 0;
        }

        .nav-button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--primary-orange);
            border: none;
            padding: 0.85rem 1.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            color: white;
            font-family: 'Funnel Sans', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background-color 0.2s, transform 0.1s;
        }

        .nav-button:hover:not(:disabled) {
            background-color: var(--hover-orange);
            transform: translateY(-2px);
        }

        .nav-button:disabled {
            background-color: var(--border-light);
            color: #A0AEC0;
            cursor: not-allowed;
            transform: none;
        }

        .nav-button svg {
            width: 1.25rem;
            height: 1.25rem;
        }

        .progress {
            text-align: center;
        }

        .progress-text {
            font-size: 1rem;
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 0.75rem;
            font-family: 'Funnel Display', sans-serif;
        }

        .progress-dots {
            display: flex;
            gap: 0.35rem;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 300px;
        }

        .progress-dot {
            height: 0.5rem;
            width: 0.5rem;
            border-radius: 9999px;
            background-color: var(--border-light);
            transition: all 0.3s;
        }

        .progress-dot.active {
            background-color: var(--primary-orange);
            width: 1.5rem;
        }

        /* Colores de fondo por nivel ajustados a la marca */
        .bg-intro { background: linear-gradient(135deg, var(--bg-main), var(--bg-special)); }
        .bg-level1 { background: linear-gradient(135deg, #F0FFF4, #C6F6D5); }
        .bg-level2 { background: linear-gradient(135deg, #FFFBEB, #FEEBC8); }
        .bg-level3 { background: linear-gradient(135deg, #EBF8FF, #BEE3F8); }
        .bg-level4 { background: linear-gradient(135deg, #FAF5FF, #E9D5FF); }
        .bg-final { background: linear-gradient(135deg, var(--bg-main), var(--bg-special)); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Agent de Secretaria amb Mistral</h1>
            <p>Exercici pas a pas de Xammar Digital (2026)</p>
        </div>

        <div id="slideContainer" class="slide-container"></div>

        <div class="navigation">
            <button id="prevBtn" class="nav-button" onclick="prevSlide()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Anterior
            </button>

            <div class="progress">
                <div class="progress-text" id="progressText">1 / 6</div>
                <div class="progress-dots" id="progressDots"></div>
            </div>

            <button id="nextBtn" class="nav-button" onclick="nextSlide()">
                Següent
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const slides = [
            {
                level: "Introducció",
                title: "Construeix el teu Agent",
                description: "<strong>Objectiu:</strong> Crear un «Agent» (un assistent especialitzat) a Mistral que gestioni els teus correus de forma autònoma, classificant-los i redactant esborranys amb la teva veu personal.",
                colorClass: "bg-intro"
            },
            {
                level: "PAS 1",
                title: "Configuració de l'Entorn (La «Closca»)",
                description: "Entra a <strong>mistral.ai</strong> > <strong>Agents</strong> > <strong>Crear nou agent</strong>.\n\n• <strong>Model:</strong> Mistral Large 2.1 (El més intel·ligent per a tasques d'oficina).\n• <strong>Temperatura:</strong> 0.3.\n  <span style='color:var(--primary-orange)'>💡 Per què?</span> Perquè en secretaria volem precisió. Una temperatura alta (0.8) faria que la IA s'inventés dades. Amb 0.3 serà fidel a la realitat.\n• <strong>Metadades (Opcional però pro):</strong> Posa-hi <code>{\"Departament\": \"Secretaria\", \"Localització\": \"Mataró\"}</code>.\n  <span style='color:var(--primary-orange)'>💡 Per què?</span> Perquè si en el futur tens 20 agents, podràs filtrar-los ràpidament per departament.",
                colorClass: "bg-level1"
            },
            {
                level: "PAS 2",
                title: "Instruccions del Sistema (El «Cervell»)",
                description: "Copia i enganxa aquest bloc al camp d'instruccions. Fixa't en com dividim la informació perquè la IA no es col·lapsi.",
                infoBox: "**ROL:** Ets l'Anna, l'assistent de secretaria de la gestoria. El teu to és professional, empàtic i molt directe (estil Maresme).\n\n**TAREES PRINCIPALS:**\n1. **Classificar:** Digues si el correu és: [URGENT], [CITA], [INFO] o [NOTIFICACIÓ].\n2. **Prioritzar:** Assigna una urgència de l'1 al 5.\n3. **Respondre:** Redacta un esborrany breu.\n\n**NORMES D'ESTIL (L'Anna):**\n- No usis mai \"Estimado/a\" ni \"Cordialment\".\n- Usa expressions com: \"Anem a pams\", \"Escolta...\", \"Som-hi!\".\n- Sigues honesta: si el tràmit és pesat, digues-ho (ex: \"Això d'Hisenda és un embolic, però ho farem\").\n- Comiat: \"Seguim!\" o \"Parlem-ne\".\n\n**FORMAT DE SORTIDA:**\nSempre respon amb aquest esquema:\n- **CATEGORIA:** [Tipus de correu]\n- **URGÈNCIA:** [1-5]\n- **PROPOSTA:** [Text del correu redactat per l'Anna]",
                infoLabel: "📋 BLOC D'INSTRUCCIONS",
                colorClass: "bg-level2"
            },
            {
                level: "PAS 3",
                title: "Aprenentatge amb Exemples",
                description: "La IA aprèn millor veient casos reals. A la secció de «Demostracions», afegeix-ne almenys dues:",
                examples: [
                    {
                        title: "Exemple 1: Sol·licitud de Cita",
                        input: "Hola, voldria venir demà a les 10h per portar les factures.",
                        output: "CATEGORIA: [CITA]\nURGÈNCIA: 3\nPROPOSTA: \"Bon dia! Escolta, a les 10h ho tinc una mica ple, però si vens a les 11h et puc atendre millor. Anem a pams, porta-ho tot i ho mirem. Seguim!\""
                    },
                    {
                        title: "Exemple 2: Publicitat / Spam",
                        input: "Oferta increïble de tòner per a la teva oficina!",
                        output: "CATEGORIA: [NOTIFICACIÓ / SPAM]\nURGÈNCIA: 1\nPROPOSTA: (No cal resposta, arxivar)."
                    }
                ],
                colorClass: "bg-level3"
            },
            {
                level: "PAS 4",
                title: "Correcció de l'Aprenentatge",
                description: "A l'hora de polir el teu agent, recorda aquestes diferències entre el que fas i el que NO:",
                comparisons: [
                    {
                        bad: "Respon correus de feina.",
                        good: "Respon com l'Anna, una secretària de Mataró que va per feina.",
                        reason: "Donar un personatge evita que la IA sigui genèrica i avorrida."
                    },
                    {
                        bad: "Posa la data.",
                        good: "Posa sempre la data límit en **negreta**.",
                        reason: "El format visual ajuda el client a no perdre's."
                    },
                    {
                        bad: "No siguis maleducada.",
                        good: "Evita paraules corporatives buides com 'sinergia' o 'procedirem'.",
                        reason: "Prohibir paraules concretes \"mata\" el robot que la IA porta dins."
                    }
                ],
                colorClass: "bg-level4"
            },
            {
                level: "PAS 5",
                title: "Prova Final",
                description: "Vés a <strong>Le Chat</strong> i crida el teu agent fent servir el prefix <strong>@Admin_Anna</strong>. Enganxa aquest correu:",
                infoBox: "Hola Anna, soc el Pere. He perdut la contrasenya del portal de factures i no puc pujar res. Necessito ajuda ja!",
                infoLabel: "📩 CORREU D'ENTRADA DE PROVA",
                closing: "<strong>Si l'Anna et respon amb un \"Escolta, Pere, no et preocupis, que ho mirem ara mateix...\", l'has clavat! 🎯</strong>",
                colorClass: "bg-final"
            }
        ];

        let currentSlide = 0;

        function renderSlide() {
            const slide = slides[currentSlide];
            const container = document.getElementById('slideContainer');
            
            container.className = 'slide-container ' + slide.colorClass;
            
            let html = `
                <div class="level-badge">${slide.level}</div>
                <h2 class="slide-title">${slide.title}</h2>
            `;

            if (slide.description) {
                // Pequeño reemplazo para soportar negritas sin procesar markdown completo
                let desc = slide.description.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html += `<p class="slide-description">${desc}</p>`;
            }

            // Info Box general (único panel grande para copiar todo el conjunto)
            if (slide.infoBox) {
                html += `
                    <div class="prompt-section">
                        ${slide.infoLabel ? `<div class="prompt-label"><span></span><span>${slide.infoLabel}</span></div>` : ''}
                        <div class="prompt-box">
                            <code>${escapeHtml(slide.infoBox)}</code>
                            <button class="copy-button" onclick="copyToClipboard(${currentSlide}, 'infoBox', 0)" title="Copiar">
                                <svg id="icon-infoBox-${currentSlide}-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }

            // Bloque de Ejemplos
            if (slide.examples) {
                slide.examples.forEach((ex, idx) => {
                    html += `
                        <div class="prompt-section">
                            <div class="prompt-label" style="margin-top: 1rem;">
                                <span>📄</span><span>${ex.title}</span>
                            </div>
                            <div class="prompt-box prompt-box-gray" style="margin-bottom: 0;">
                                <strong style="color:var(--heading-blue);">Entrada:</strong>
                                <br/><code>${escapeHtml(ex.input)}</code>
                            </div>
                            <div class="prompt-box">
                                <strong style="color:var(--primary-orange);">Sortida (Anna):</strong>
                                <br/><code>${escapeHtml(ex.output)}</code>
                            </div>
                        </div>
                    `;
                });
            }

            // Bloque de Comparaciones Lineales
            if (slide.comparisons) {
                slide.comparisons.forEach((comp, idx) => {
                    html += `
                        <div class="prompt-section prompt-section-bad">
                            <div class="prompt-label"><span>❌</span><span>Instrucció fluixa:</span></div>
                            <div class="prompt-box"><code>${escapeHtml(comp.bad)}</code></div>
                        </div>
                        <div class="prompt-section">
                            <div class="prompt-label"><span>✅</span><span>Instrucció pro:</span></div>
                            <div class="prompt-box"><code>${escapeHtml(comp.good)}</code></div>
                        </div>
                        <div class="comparison-reason">
                            <strong>💡 Motiu:</strong> ${comp.reason}
                        </div>
                    `;
                });
            }

            if (slide.closing) {
                html += `<div class="closing-text">${slide.closing}</div>`;
            }

            container.innerHTML = html;

            // Update progress
            document.getElementById('progressText').textContent = `${currentSlide + 1} / ${slides.length}`;
            
            // Update progress dots
            const dotsContainer = document.getElementById('progressDots');
            dotsContainer.innerHTML = '';
            slides.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = 'progress-dot' + (index === currentSlide ? ' active' : '');
                dot.style.cursor = 'pointer';
                dot.onclick = () => {
                    currentSlide = index;
                    renderSlide();
                };
                dotsContainer.appendChild(dot);
            });

            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyToClipboard(slideIndex, type, propIndex) {
            const slide = slides[slideIndex];
            let text = "";

            if (type === 'infoBox') {
                text = slide.infoBox;
            }

            navigator.clipboard.writeText(text).then(() => {
                const icon = document.getElementById(`icon-${type}-${slideIndex}-${propIndex}`);
                const originalContent = icon.innerHTML;
                
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>';
                
                setTimeout(() => {
                    icon.innerHTML = originalContent;
                }, 2000);
            }).catch(err => {
                console.error('Error copiant el text:', err);
                alert("No s'ha pogut copiar el text");
            });
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        }

        // Initialize
        renderSlide();
    </script>
</body>
</html>
